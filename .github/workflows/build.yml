name: Build SeaChat APK Only
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment (Java & Node)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Fix Dependencies
        run: |
          rm -f package-lock.json yarn.lock
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if (!pkg.devDependencies) pkg.devDependencies = {};
            // أدوات بناء الأندرويد فقط
            pkg.devDependencies['@react-native-community/cli'] = 'latest';
            pkg.devDependencies['@react-native-community/cli-platform-android'] = 'latest';
            pkg.devDependencies['@react-native/metro-config'] = 'latest';
            pkg.devDependencies['metro-config'] = 'latest';
            pkg.devDependencies['@react-native/babel-preset'] = 'latest';
            if (pkg.dependencies && pkg.dependencies['react-native-image-picker']) {
              pkg.dependencies['react-native-image-picker'] = '^7.1.2';
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          npm install --legacy-peer-deps

      - name: Create Configs (No Syntax Errors)
        run: |
          # هذه الطريقة تمنع حدوث خطأ الأقواس (Unexpected token)
          echo "module.exports = { presets: ['module:@react-native/babel-preset'] };" > babel.config.js
          
          echo "const {getDefaultConfig, mergeConfig} = require('@react-native/metro-config');" > metro.config.js
          echo "const config = {};" >> metro.config.js
          echo "module.exports = mergeConfig(getDefaultConfig(__dirname), config);" >> metro.config.js

      - name: Setup Android Project
        run: |
          # بناء هيكل الأندرويد الخام
          npx @react-native-community/cli init SeaChatTemp --pm npm --skip-install --yes
          cp -r SeaChatTemp/android ./
          rm -rf SeaChatTemp
          mkdir -p android/app/src/main/assets
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          # إضافة تصريح الإنترنت للـ APK
          sed -i '/<application/i \    <uses-permission android:name="android:permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

      - name: Bundle Javascript for Mobile
        run: |
          # تحويل الكود إلى صيغة يفهمها الأندرويد (APK Bundle)
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Generate APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-App-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
