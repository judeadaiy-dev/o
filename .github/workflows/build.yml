name: Build SeaChat Real App
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java & Node
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies (The Fix)
        run: |
          # مسح أي مخلفات قديمة
          rm -rf node_modules package-lock.json
          
          # تثبيت المكتبات مع إجبار السيرفر على تخطي تعارض الإصدارات
          npm install --legacy-peer-deps
          
          # التأكد من وجود المكتبات الأساسية لتطبيقك
          npm install react-native@0.74.5 react@18.2.0 --save --legacy-peer-deps

      - name: Force Create Android Environment
        run: |
          # بناء الهيكل دون طرح أسئلة (y/n)
          npx react-native init SeaChat --version 0.74.5 --skip-install --no-interactive || true
          
          # نقل ملفات الأندرويد للمجلد الرئيسي
          mkdir -p android/app/src/main/assets
          if [ -d "SeaChat/android" ]; then
            cp -r SeaChat/android/* android/
          fi
          rm -rf SeaChat
          
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          
          # ضبط Gradle للإصدار المستقر 8.10
          gradle wrapper --gradle-version 8.10 --project-dir android

      - name: Bundle Your Real Code
        run: |
          # هذه هي أهم خطوة لكي لا يطلع التطبيق فارغاً
          # نحن نربط ملف index.js الخاص بكِ مباشرة بالـ APK
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Assemble APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload SeaChat
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Real-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
