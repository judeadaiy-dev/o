name: Build SeaChat Mobile APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fix Package JSON and Install Dependencies
        run: |
          # استبدال الإصدار الخاطئ 8.3.0 بالإصدار الصحيح المستقر داخل الملف تلقائياً
          sed -i 's/"react-native-image-picker": "^8.3.0"/"react-native-image-picker": "^8.2.1"/g' package.json
          
          # تثبيت نظيف ومستقر
          npm install --legacy-peer-deps

      - name: Inject Supabase Keys into .env File
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Generate Fresh Modern Android Project
        run: |
          npx react-native@0.76.0 init SeaChatTemp --version 0.76.0 --skip-install --npm
          cp -r SeaChatTemp/android ./
          rm -rf SeaChatTemp
          mkdir -p android/app/src/main/assets
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Configure Vector Icons for Android
        run: |
          echo "apply from: \"../../node_modules/react-native-vector-icons/fonts.gradle\"" >> android/app/build.gradle

      - name: Inject Internet Permission to AndroidManifest
        run: |
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android:permission.INTERNET" \/>' android/app/src/main/AndroidManifest.xml

      - name: Build Production React Native Bundle
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Compile Production APK via Gradle
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Final-Mobile-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
