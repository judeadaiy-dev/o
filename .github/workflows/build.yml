name: Build SeaChat Mobile APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Project and Node Modules
        run: |
          # تنظيف أي ملفات قديمة
          rm -f package-lock.json yarn.lock
          
          # تعديل ملف القائمة لإضافة المحركات المفقودة برمجياً
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            
            if (!pkg.devDependencies) pkg.devDependencies = {};
            // هذه المكتبات هي التي تصنع مجلد node_modules المتكامل
            pkg.devDependencies['@react-native-community/cli'] = 'latest';
            pkg.devDependencies['@react-native-community/cli-platform-android'] = 'latest';
            pkg.devDependencies['@react-native/metro-config'] = 'latest';
            pkg.devDependencies['metro-config'] = 'latest';
            pkg.devDependencies['@react-native/babel-preset-standard'] = 'latest';
            pkg.devDependencies['@babel/preset-env'] = 'latest';

            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          # الأمر السحري الذي يصنع مجلد node_modules في السيرفر
          npm install --legacy-peer-deps

      - name: Create Essential Configs
        run: |
          # إنشاء ملفات الإعدادات لكي يفهم السيرفر خريطة كودك
          echo \"const {getDefaultConfig, mergeConfig} = require('@react-native/metro-config');
          const config = {};
          module.exports = mergeConfig(getDefaultConfig(__dirname), config);\" > metro.config.js
          
          echo \"module.exports = { presets: ['module:@react-native/babel-preset-standard'] };\" > babel.config.js

      - name: Inject Supabase Keys
        run: |
          echo \"SUPABASE_URL=${{ secrets.SUPABASE_URL }}\" > .env
          echo \"SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}\" >> .env

      - name: Generate Android Shell
        run: |
          # إنشاء قالب الأندرويد الذي سيوضع داخله كود SeaChat
          npx @react-native-community/cli init SeaChatTemp --pm npm --skip-install
          cp -r SeaChatTemp/android ./
          rm -rf SeaChatTemp
          mkdir -p android/app/src/main/assets
          echo \"sdk.dir=$ANDROID_SDK_ROOT\" > android/local.properties

      - name: Configure Vector Icons
        run: |
          echo \"apply from: '../../node_modules/react-native-vector-icons/fonts.gradle'\" >> android/app/build.gradle

      - name: Fix Permissions
        run: |
          sed -i '/<application/i \    <uses-permission android:name=\"android:permission.INTERNET\" />' android/app/src/main/AndroidManifest.xml

      - name: Bundle Javascript
        run: |
          # هنا يتم دمج كودك مع مجلد node_modules الذي صنعه السيرفر
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Create APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Final-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
