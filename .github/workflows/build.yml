name: Build SeaChat Final Stable Force
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Full Auto Generation
        run: |
          rm -rf android
          yes | npx react-native@0.74.5 init SeaChat --version 0.74.5 --skip-install --install-pods false
          cp -r SeaChat/android ./
          cp SeaChat/metro.config.js ./
          cp SeaChat/babel.config.js ./
          cp SeaChat/app.json ./
          rm -rf SeaChat

      - name: Install All Required Dependencies
        run: |
          npm install react-native@0.74.5 react@18.2.0 --legacy-peer-deps
          npm install @react-navigation/native @react-navigation/native-stack @react-navigation/bottom-tabs --legacy-peer-deps
          npm install react-native-screens react-native-safe-area-context react-native-paper react-native-vector-icons --legacy-peer-deps
          npm install @supabase/supabase-js react-native-url-polyfill --legacy-peer-deps

      - name: Force Version Resolution (The Ultimate Fix)
        run: |
          # سنستخدم ملف إعدادات خاص يمنع أي مكتبة من سحب إصدار أعلى من 1.13.1
          cat <<EOF > android/build.gradle
          buildscript {
              ext {
                  buildToolsVersion = "34.0.0"
                  minSdkVersion = 21
                  compileSdkVersion = 34
                  targetSdkVersion = 34
                  ndkVersion = "26.1.10909125"
                  kotlinVersion = "1.9.22"
              }
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath("com.android.tools.build:gradle:8.2.1")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:\$kotlinVersion")
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url "\$rootDir/../node_modules/react-native/android" }
              }
              
              # هنا السحر: إجبار السيرفر على الإصدار القديم مهما حاولت المكاتب الأخرى
              configurations.all {
                  resolutionStrategy {
                      force "androidx.core:core:1.13.1"
                      force "androidx.core:core-ktx:1.13.1"
                  }
              }
          }
          EOF

          # ضبط الخصائص والذاكرة
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m" > android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "hermesEnabled=true" >> android/gradle.properties
          echo "newArchEnabled=false" >> android/gradle.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Create App Bundle
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4096m"

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Stable-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
