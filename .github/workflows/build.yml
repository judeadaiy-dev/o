name: Build SeaChat Auto Full
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Full Auto Generation
        run: |
          # مسح أي ملفات قديمة لضمان بناء "نظيف"
          rm -rf android
          
          # إجبار السيرفر على بناء مجلد أندرويد متوافق تلقائياً
          # أمر 'yes' يقوم بالموافقة على كل الأسئلة التفاعلية بدلاً منكِ
          yes | npx react-native@0.74.5 init SeaChat --version 0.74.5 --skip-install --install-pods false
          
          # نقل المجلد الذي بناه React Native إلى المسار الرئيسي
          cp -r SeaChat/android ./
          rm -rf SeaChat

      - name: Install Dependencies
        run: |
          # تثبيت المكتبات التي يحتاجها كودك
          npm install --legacy-peer-deps
          
          # تفعيل خاصية AndroidX الضرورية للمكتبات الحديثة
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Create App Bundle
        run: |
          # ربط ملفاتك (index.js) بالمجلد الذي بناه السيرفر
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Full-Auto
          path: android/app/build/outputs/apk/debug/app-debug.apk
