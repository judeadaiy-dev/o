name: Build SeaChat Auto-Complete
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java & Node
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Auto-Generate Missing Project Files
        run: |
          if [ ! -f index.js ]; then
            echo "import {AppRegistry} from 'react-native'; import App from './App'; import {name as appName} from './app.json'; AppRegistry.registerComponent(appName, () => App);" > index.js
          fi

          if [ ! -f app.json ]; then
            echo '{"name": "SeaChat", "displayName": "SeaChat"}' > app.json
          fi

          if [ ! -f App.js ]; then
            echo "import React from 'react'; import {View, Text} from 'react-native'; export default function App() { return <View style={{flex:1, justifyContent:'center', alignItems:'center'}}><Text>SeaChat Ready!</Text></View> }" > App.js
          fi

          cat <<EOF > metro.config.js
          const {getDefaultConfig, mergeConfig} = require('@react-native/metro-config');
          module.exports = mergeConfig(getDefaultConfig(__dirname), {});
          EOF

      - name: Install Dependencies (Fixed Versions)
        run: |
          npm install react-native@0.74.5 react@18.2.0 --legacy-peer-deps
          npm install @react-native/metro-config @react-native/babel-preset --save-dev --legacy-peer-deps
          npm install @react-navigation/native @react-navigation/native-stack @react-navigation/bottom-tabs --legacy-peer-deps
          npm install react-native-screens react-native-safe-area-context react-native-paper react-native-vector-icons --legacy-peer-deps
          npm install @supabase/supabase-js react-native-url-polyfill --legacy-peer-deps

      - name: Extract Official Gradle Wrapper & Configure Build
        run: |
          # 1. توليد مشروع مرجعي مؤقت لاستخراج ملفات التشغيل الرسمية
          yes | npx react-native@0.74.5 init TempApp --version 0.74.5 --skip-install --install-pods false
          
          mkdir -p android/gradle/wrapper
          mkdir -p android/app/src/main/assets
          
          cp TempApp/android/gradlew android/
          cp TempApp/android/gradle/wrapper/gradle-wrapper.jar android/gradle/wrapper/
          cp TempApp/android/gradle/wrapper/gradle-wrapper.properties android/gradle/wrapper/
          
          rm -rf TempApp

          # 2. كتابة ملف build.gradle ذكي يعتمد على التحديد التلقائي للمسار
          cat <<'EOF' > android/build.gradle
          buildscript {
              ext {
                  buildToolsVersion = "34.0.0"
                  minSdkVersion = 21
                  compileSdkVersion = 34
                  targetSdkVersion = 34
                  ndkVersion = "26.1.10909125"
                  kotlinVersion = "1.9.22"
              }
              repositories { 
                  google()
                  mavenCentral() 
              }
              dependencies {
                  classpath("com.android.tools.build:gradle:8.2.1")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
                  // السحر هنا: قراءة البلوجن مباشرة من المسار الفعلي داخل السيرفر دون الاعتماد على مسار نسبي قد يضيع
                  classpath(files("${rootProject.projectDir}/../node_modules/react-native/android/com/facebook/react/react-native-gradle-plugin/0.74.5/react-native-gradle-plugin-0.74.5.jar"))
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url "${rootProject.projectDir}/../node_modules/react-native/android" }
              }
              configurations.all {
                  resolutionStrategy {
                      force "androidx.core:core:1.13.1"
                      force "androidx.core:core-ktx:1.13.1"
                  }
              }
          }
          EOF

          # ضبط الخصائص والذاكرة
          {
            echo "org.gradle.jvmargs=-Xmx4096m"
            echo "android.useAndroidX=true"
            echo "android.enableJetifier=true"
            echo "hermesEnabled=true"
            echo "newArchEnabled=false"
            echo "android.suppressUnsupportedCompileSdk=35"
          } > android/gradle.properties
          
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build JS Assets
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Finalize & Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4096m"

      - name: Export APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Full-Auto-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk

