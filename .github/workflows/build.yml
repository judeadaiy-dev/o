name: Build SeaChat Absolute Final
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java & Node
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --save react-native@0.74.5 react@18.2.0 --legacy-peer-deps
          npm install --legacy-peer-deps

      - name: Manual Android Structure
        run: |
          mkdir -p android/app/src/main/assets
          mkdir -p android/gradle/wrapper
          echo "rootProject.name = 'SeaChat'" > android/settings.gradle
          echo "include ':app'" >> android/settings.gradle
          
          cat <<EOF > android/build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath("com.android.tools.build:gradle:8.2.1") }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          gradle wrapper --gradle-version 8.10 --project-dir android
          chmod +x android/gradlew

      - name: Bundle Your Code
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build APK
        working-directory: android
        run: |
          # تنظيف وبناء من جديد
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK (The Fix)
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-App
          # هذا هو المسار الصحيح الذي سيبحث فيه السيرفر عن الملف
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
