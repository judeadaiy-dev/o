name: Build SeaChat Mobile APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Project Dependencies
        run: |
          npm install
          npm install @react-native-community/cli

      - name: Generate Android Native Folder
        run: |
          npx react-native@0.74.5 init SeaChatTemp --version 0.74.5 --skip-install --directory SeaChatTemp
          cp -r SeaChatTemp/android ./
          rm -rf SeaChatTemp
          mkdir -p android/app/src/main/assets
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build React Native Bundle
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Compile APK via Gradle
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Mobile-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
