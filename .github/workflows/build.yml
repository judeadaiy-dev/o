name: Build SeaChat Mobile APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fix Package JSON and Install Dependencies
        run: |
          rm -f package-lock.json yarn.lock
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if (pkg.dependencies && pkg.dependencies['react-native-image-picker']) {
              pkg.dependencies['react-native-image-picker'] = '^8.2.1';
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          npm install --legacy-peer-deps

      - name: Inject Supabase Keys into .env File
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Generate Fresh Modern Android Project
        run: |
          # تم تصحيح الأمر لاستخدام الخيار --pm بدلاً من --npm وتجنب بناء الويب
          npx react-native@latest init SeaChatTemp --pm npm --skip-install --yes
          
          # نقل مجلد الأندرويد فقط لضمان بناء تطبيق موبايل
          cp -r SeaChatTemp/android ./
          rm -rf SeaChatTemp
          
          # تهيئة مجلد الأصول وإعداد مسار الـ SDK
          mkdir -p android/app/src/main/assets
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Configure Vector Icons for Android
        run: |
          echo "apply from: \"../../node_modules/react-native-vector-icons/fonts.gradle\"" >> android/app/build.gradle

      - name: Inject Internet Permission to AndroidManifest
        run: |
          # التأكد من وجود صلاحية الإنترنت اللازمة لتطبيق SeaChat (لسوبابيز)
          sed -i '/<application/i \    <uses-permission android:name="android:permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

      - name: Build Production React Native Bundle
        run: |
          # تحويل كود جافا سكريبت إلى حزمة أندرويد (Bundle)
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Compile Production APK via Gradle
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Final-Mobile-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
