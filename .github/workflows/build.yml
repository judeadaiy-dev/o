name: Build SeaChat Stable APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Fix Dependencies
        run: |
          rm -f package-lock.json yarn.lock
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if (!pkg.devDependencies) pkg.devDependencies = {};
            if (!pkg.dependencies) pkg.dependencies = {};
            
            // إصدارات CLI محددة لضمان التوافق
            pkg.devDependencies['@react-native-community/cli'] = '13.6.9';
            pkg.devDependencies['@react-native-community/cli-platform-android'] = '13.6.9';
            pkg.devDependencies['@react-native/babel-preset'] = 'latest';
            pkg.devDependencies['@react-native/metro-config'] = 'latest';
            
            pkg.dependencies['react-native-paper'] = 'latest';
            pkg.dependencies['react-native-safe-area-context'] = 'latest';
            pkg.dependencies['react-native-vector-icons'] = 'latest';
            pkg.dependencies['react-native-screens'] = 'latest';
            pkg.dependencies['@react-navigation/native'] = 'latest';
            pkg.dependencies['@react-navigation/native-stack'] = 'latest';
            pkg.dependencies['@react-navigation/bottom-tabs'] = 'latest';
            pkg.dependencies['@supabase/supabase-js'] = 'latest';
            pkg.dependencies['react-native-url-polyfill'] = 'latest';
            pkg.dependencies['react-native-image-picker'] = '7.1.2';
            
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          npm install --legacy-peer-deps

      - name: Create Configs
        run: |
          echo '{"name": "SeaChat", "displayName": "SeaChat"}' > app.json
          echo "module.exports = { presets: ['module:@react-native/babel-preset'] };" > babel.config.js
          echo "const {getDefaultConfig, mergeConfig} = require('@react-native/metro-config'); module.exports = mergeConfig(getDefaultConfig(__dirname), {});" > metro.config.js

      - name: Setup Android Project & Fix Gradle
        run: |
          npx @react-native-community/cli init SeaChat --pm npm --skip-install
          cp -r SeaChat/android ./
          rm -rf SeaChat
          mkdir -p android/app/src/main/assets
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          
          # أهم سطر: إجبار Gradle على التراجع لإصدار مستقر 8.10
          cd android
          ./gradlew wrapper --gradle-version 8.10 --distribution-type bin
          cd ..
          
          sed -i '/<application/i \    <uses-permission android:name="android:permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

      - name: Bundle Javascript
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Generate Final APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Working-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
