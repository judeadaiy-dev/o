name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. جلب الكود من المستودع
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 2. إعداد بيئة Node
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # 3. إعداد بيئة Java للهاتف
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================
      # 4. تثبيت المكتبات البرمجية
      # =========================
      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps

      # =========================
      # 5. تثبيت حزم الهاتف والاتصال
      # =========================
      - name: Install Native Mobile Packages
        run: |
          npm install react-native-url-polyfill @react-native-async-storage/async-storage @supabase/supabase-js --legacy-peer-deps

      # =========================
      # 6. توليد مجلد أندرويد أصلي للمشروع
      # =========================
      - name: Generate Android Folder
        run: |
          npx @react-native-community/cli init SeaChat --template react-native-template-typescript --skip-install || true
          if [ -d "SeaChat/android" ]; then
            cp -r SeaChat/android ./android
            cp SeaChat/package.json ./package.json.bak
            rm -rf SeaChat
          fi
          # في حال فشل القالب، يتم توليد الهيكل الأساسي للأندرويد لضمان استمرار البناء
          if [ ! -d "android" ]; then
            npx react-native android --package-name com.seachat.app || true
          fi

      # =========================
      # 7. تثبيت خط القاهرة داخل مجلد الأندرويد
      # =========================
      - name: Setup Cairo Font
        run: |
          mkdir -p android/app/src/main/assets/fonts
          curl -L https://github.com -o android/app/src/main/assets/fonts/Cairo-Regular.ttf

      # =========================
      # 8. إنشاء ملف الألوان والتصميم
      # =========================
      - name: Create Theme
        run: |
          mkdir -p src/constants
          cat > src/constants/theme.js << 'EOF'
          export const Colors = {
            primary: '#BF360C',
            secondary: '#FF6F00',
            background: '#FFF3E0',
            surface: '#FFFFFF',
            text: '#111111'
          };
          export const Fonts = {
            regular: 'Cairo-Regular'
          };
          EOF

      # =========================
      # 9. إصلاح مسارات الاستيراد تلقائياً
      # =========================
      - name: Fix Imports
        run: |
          find src -type f \( -name "*.js" -o -name "*.jsx" -o -name "*.ts" -o -name "*.tsx" \) -exec sed -i 's|\./src/hooks/useAuth|\./src/screens/hooks/useAuth|g' {} + || true

      # =========================
      # 10. إعداد قاعدة بيانات Supabase
      # =========================
      - name: Create Supabase Config
        run: |
          mkdir -p src/constants
          cat > src/constants/supabase.js << 'EOF'
          import 'react-native-url-polyfill/auto';
          import AsyncStorage from '@react-native-async-storage/async-storage';
          import { createClient } from '@supabase/supabase-js';

          const supabaseUrl = 'https://YOUR_PROJECT.supabase.co';
          const supabaseAnonKey = 'YOUR_ANON_KEY';

          export const supabase = createClient(
            supabaseUrl,
            supabaseAnonKey,
            {
              auth: {
                storage: AsyncStorage,
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: false
              }
            }
          );
          EOF

      # =========================
      # 11. ربط ملفات الـ Native وتجميع حزمة الـ APK
      # =========================
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # =========================
      # 12. رفع ملف الـ APK لتنزيله فوراً
      # =========================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
