name: Build SeaChat Clean Automatic
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java & Node
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Project Packages
        run: |
          # 1. تثبيت الحزم والمكتبات التي يستند عليها مشروعك بالكامل
          npm install react-native@0.74.5 react@18.2.0 --legacy-peer-deps
          npm install @react-native/metro-config @react-native/babel-preset --save-dev --legacy-peer-deps
          npm install @react-navigation/native @react-navigation/native-stack @react-navigation/bottom-tabs --legacy-peer-deps
          npm install react-native-screens react-native-safe-area-context react-native-paper react-native-vector-icons --legacy-peer-deps
          npm install @supabase/supabase-js react-native-url-polyfill --legacy-peer-deps

      - name: One-Command Android Generation (الحل النهائي)
        run: |
          # 2. توليد مجلد أندرويد كامل ورسمي متوافق 100% مع الإصدار المستهدف
          npx react-native ctx-bootstrap || true
          yes | npx react-native eject || npx react-native@0.74.5 init SeaChatTemp --version 0.74.5 --skip-install --install-pods false
          
          # إذا تم التوليد عبر المجلد المؤقت، ننقل ملف الأندرويد النظيف فوراً للمسار الرئيسي
          if [ -d SeaChatTemp/android ]; then
            rm -rf android
            mv SeaChatTemp/android ./
            mv SeaChatTemp/app.json ./
            rm -rf SeaChatTemp
          fi

      - name: Inject Resolution Strategy & Configurations
        run: |
          # 3. تهيئة بيئة الأندرويد الناتجة لمنع النزاعات وضبط الذاكرة تلقائياً
          mkdir -p android/app/src/main/assets
          
          # فرض إصدارات أندرويد المستقرة داخل ملف الجرادل الذي تم توليده فوراً
          sed -i '/allprojects {/a \    configurations.all { resolutionStrategy { force "androidx.core:core:1.13.1", "androidx.core:core-ktx:1.13.1" } }' android/build.gradle
          
          {
            echo "org.gradle.jvmargs=-Xmx4096m"
            echo "android.useAndroidX=true"
            echo "android.enableJetifier=true"
            echo "hermesEnabled=true"
            echo "newArchEnabled=false"
            echo "android.suppressUnsupportedCompileSdk=35"
          } > android/gradle.properties
          
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build JS Assets Bundle
        run: |
          # 4. تجميع ملفات الجافا سكريبت داخل المجلد الجديد
          cat <<EOF > metro.config.js
          const {getDefaultConfig, mergeConfig} = require('@react-native/metro-config');
          module.exports = mergeConfig(getDefaultConfig(__dirname), {});
          EOF
          
          if [ ! -f index.js ]; then
            echo "import {AppRegistry} from 'react-native'; import App from './App'; AppRegistry.registerComponent('SeaChat', () => App);" > index.js
          fi
          
          if [ ! -f App.js ]; then
            echo "import React from 'react'; import {View, Text} from 'react-native'; export default function App() { return <View style={{flex:1, justifyContent:'center', alignItems:'center'}}><Text>SeaChat Ready!</Text></View> }" > App.js
          fi

          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Compile and Build Final APK
        working-directory: android
        run: |
          # 5. تشغيل أمر البناء النهائي للـ APK النظيف
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4096m"

      - name: Export APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Clean-Auto-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk

