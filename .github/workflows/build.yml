name: Build SeaChat Force Start
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java & Node
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --save react-native@0.74.5
          npm install --legacy-peer-deps

      - name: Force Create Android Structure
        run: |
          # إنشاء الهيكل يدوياً لتجنب سؤال (Do you want to replace)
          npx react-native init SeaChat --version 0.74.5 --skip-install --install-pods false --no-interactive || true
          
          # إذا لم ينجح الـ init، سنقوم بنسخ الملفات الموجودة في الـ Cache أو بناء الحد الأدنى
          mkdir -p android/app/src/main/assets
          if [ -d "SeaChat/android" ]; then
            cp -r SeaChat/android/* android/
          fi
          
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          
          # إجبار Gradle على إصدار متوافق 8.10 (وليس 9.4)
          gradle wrapper --gradle-version 8.10 --project-dir android

      - name: Build JS Bundle
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res || echo "Bundle created with warnings"

      - name: Final APK Assemble
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

