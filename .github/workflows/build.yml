name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Generate Android folder
        run: |
          npx @react-native-community/cli@latest init SeaChatTemp --version 0.74.5 --skip-install --directory SeaChatTemp
          cp -r SeaChatTemp/android ./
          rm -rf SeaChatTemp
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          
      - name: Bundle
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
          
      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug
        
      - uses: actions/upload-artifact@v4
        with:
          name: SeaChat-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
