name: Build SeaChat APK
on:
  push:
    branches:
      - main         # سيبدأ البناء فوراً بمجرد رفع الكود للفرع الرئيسي
  workflow_dispatch: # يتيح لك التشغيل اليدوي من المتصفح أيضاً

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @react-native-community/cli

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare Android Folder
        run: |
          mkdir -p android/app/src/main/assets
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build React Native Bundle
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Main-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
