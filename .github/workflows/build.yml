name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Latest Dependencies
        run: |
          npm install @supabase/supabase-js@latest react-native-url-polyfill
          npm install react-native-image-picker@latest react-native-audio-recorder-player@latest
          npm install @react-native-async-storage/async-storage@latest
          npm install react-native-vector-icons@latest
          npm install react-native-fs@latest react-native-permissions@latest

      - name: Remove old android folder
        run: rm -rf android ios

      - name: Generate Android folder only
        run: npx @react-native-community/cli init SeaChatTemp --directory android_temp --skip-install
        env:
          CLI_ASK_PROMPTS: false

      - name: Move android folder to root
        run: mv android_temp/android ./android && rm -rf android_temp

      - name: Fix package name
        run: |
          find ./android -type f -exec sed -i 's/com.seachattemp/com.seachat/g' {} +
          find ./android -type f -exec sed -i 's/SeaChatTemp/SeaChat/g' {} +

      - name: Generate Desert App Icon
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          
          # ايقونة صحراوية SVG -> PNG باستخدام ImageMagick
          sudo apt-get update && sudo apt-get install -y imagemagick
          
          cat > icon.svg << 'EOF'
          <svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="desert" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#D2B48C;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#8D6E63;stop-opacity:1" />
              </linearGradient>
              <filter id="glass">
                <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
              </filter>
            </defs>
            <rect width="512" height="512" rx="115" fill="url(#desert)"/>
            <circle cx="256" cy="256" r="180" fill="rgba(255,255,255,0.15)" filter="url(#glass)"/>
            <path d="M156 336L256 236L356 336L306 286L256 336L206 286Z" fill="#F5F5F5" opacity="0.9"/>
            <circle cx="256" cy="200" r="20" fill="#F5F5F5" opacity="0.7"/>
          </svg>
          EOF
          
          convert -background none icon.svg -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert -background none icon.svg -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert -background none icon.svg -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert -background none icon.svg -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert -background none icon.svg -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          # نسخة دائرية
          cp android/app/src/main/res/mipmap-mdpi/ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xhdpi/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Add Permissions + Supabase + Realtime
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />

              <application
                android:name=".MainApplication"
                android:label="@string/app_name"
                android:icon="@mipmap/ic_launcher"
                android:roundIcon="@mipmap/ic_launcher_round"
                android:allowBackup="false"
                android:theme="@style/AppTheme"
                android:usesCleartextTraffic="true"
                android:networkSecurityConfig="@xml/network_security_config">
                <activity
                  android:name=".MainActivity"
                  android:label="@string/app_name"
                  android:configChanges="keyboard|keyboardHidden|orientation|screenLayout|screenSize|smallestScreenSize|uiMode"
                  android:launchMode="singleTask"
                  android:windowSoftInputMode="adjustResize"
                  android:exported="true">
                  <intent-filter>
                      <action android:name="android.intent.action.MAIN" />
                      <category android:name="android.intent.category.LAUNCHER" />
                  </intent-filter>
                </activity>
              </application>
          </manifest>
          EOF

          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">supabase.co</domain>
                  <domain includeSubdomains="true">supabase.in</domain>
              </domain-config>
          </network-security-config>
          EOF

      - name: Apply Desert Glass Theme
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <resources>
              <color name="desert_sand">#D2B48C</color>
              <color name="desert_stone">#8D6E63</color>
              <color name="desert_night">#4E342E</color>
          </resources>
          EOF
          
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.DayNight.NoActionBar">
                  <item name="android:statusBarColor">@color/desert_night</item>
                  <item name="android:navigationBarColor">@color/desert_sand</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:windowBackground">@color/desert_sand</item>
              </style>
          </resources>
          EOF

      - name: Setup Supabase + Colors
        run: |
          mkdir -p src
          cat > src/colors.js << 'EOF'
          export const Colors = {
            primary: '#8D6E63', secondary: '#A0826D', accent: '#C19A6B',
            background: '#D2B48C', backgroundDark: '#4E342E', surface: '#E6D5B8',
            glass: 'rgba(255, 255, 255, 0.15)', glassDark: 'rgba(78, 52, 46, 0.25)',
            glassBorder: 'rgba(255, 255, 255, 0.2)', text: '#3E2723',
            textLight: '#F5F5F5', textMuted: '#6D4C41',
          };
          export const GlassStyles = {
            card: { backgroundColor: Colors.glass, borderColor: Colors.glassBorder, borderWidth: 1, borderRadius: 16 },
          };
          EOF
          
          cat > src/supabase.js << 'EOF'
          import 'react-native-url-polyfill/auto';
          import { createClient } from '@supabase/supabase-js';
          import AsyncStorage from '@react-native-async-storage/async-storage';
          
          const supabaseUrl = 'https://jmsmrojtlstppnpwmkkk.supabase.co';
          const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imptc21yb2p0bHN0cHBucHdta2trIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTg2NDAsImV4cCI6MjA4ODM5NDY0MH0.j7gxr5CvrfvbJJzK_pMwVHiCE2AqpXUTThpeLEBmsos';
          
          export const supabase = createClient(supabaseUrl, supabaseAnonKey, {
            auth: { storage: AsyncStorage, autoRefreshToken: true, persistSession: true, detectSessionInUrl: false },
            realtime: { params: { eventsPerSecond: 10 } },
          });
          EOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-APK-Desert
          path: android/app/build/outputs/apk/debug/app-debug.apk
