name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Node
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # Java
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================
      # Remove old android
      # =========================
      - name: Clean Android
        run: rm -rf android

      # =========================
      # Install dependencies
      # =========================
      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps

      # =========================
      # Install Mobile Libraries Only
      # =========================
      - name: Install Native Mobile Packages
        run: |
          npm install expo expo-font expo-av expo-camera expo-image-picker react-native-url-polyfill @react-native-async-storage/async-storage @supabase/supabase-js --legacy-peer-deps

      # =========================
      # Create Mobile Expo Config
      # =========================
      - name: Create app.json
        run: |
          cat > app.json << 'EOF'
          {
            "expo": {
              "name": "SeaChat",
              "slug": "seachat",
              "platforms": ["android"],
              "orientation": "portrait",
              "android": {
                "package": "com.seachat.app",
                "permissions": [
                  "INTERNET",
                  "CAMERA",
                  "RECORD_AUDIO",
                  "READ_MEDIA_IMAGES",
                  "READ_MEDIA_VIDEO",
                  "POST_NOTIFICATIONS"
                ]
              }
            }
          }
          EOF

      # =========================
      # Cairo Font
      # =========================
      - name: Setup Cairo Font
        run: |
          mkdir -p assets/fonts
          curl -L https://github.com/google/fonts/raw/main/ofl/cairo/Cairo-Regular.ttf -o assets/fonts/Cairo-Regular.ttf

      # =========================
      # Create Theme
      # =========================
      - name: Create Theme
        run: |
          mkdir -p src/constants

          cat > src/constants/theme.js << 'EOF'
          export const Colors = {
            primary: '#BF360C',
            secondary: '#FF6F00',
            background: '#FFF3E0',
            surface: '#FFFFFF',
            text: '#111111'
          };

          export const Fonts = {
            regular: 'Cairo-Regular'
          };
          EOF

      # =========================
      # Auto Fix Broken Imports
      # =========================
      - name: Fix Imports
        run: |
          find src -type f \( -name "*.js" -o -name "*.jsx" -o -name "*.ts" -o -name "*.tsx" \) -exec sed -i 's#./src/hooks/useAuth#./src/screens/hooks/useAuth.ts - Hook#g' {} + || true

      # =========================
      # Supabase Config
      # =========================
      - name: Create Supabase Config
        run: |
          mkdir -p src/constants

          cat > src/constants/supabase.js << 'EOF'
          import 'react-native-url-polyfill/auto';
          import AsyncStorage from '@react-native-async-storage/async-storage';
          import { createClient } from '@supabase/supabase-js';

          const supabaseUrl = 'https://YOUR_PROJECT.supabase.co';
          const supabaseAnonKey = 'YOUR_ANON_KEY';

          export const supabase = createClient(
            supabaseUrl,
            supabaseAnonKey,
            {
              auth: {
                storage: AsyncStorage,
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: false
              }
            }
          );
          EOF

      # =========================
      # Generate Android Project
      # =========================
      - name: Generate Android
        run: npx expo prebuild --platform android --clean

      # =========================
      # Build APK ONLY
      # =========================
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # =========================
      # Upload APK
      # =========================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
