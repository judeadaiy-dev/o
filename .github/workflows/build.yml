name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. جلب الكود من المستودع
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 2. إعداد بيئة Node
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # 3. إعداد بيئة Java للأندرويد
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================
      # 4. تهيئة ملفات الـ Mobile ومحرك التجميع
      # =========================
      - name: Setup React Native Environment
        run: |
          # تثبيت حزم الهاتف الأساسية لمنع البناء للويب
          npm install react-native react-native-url-polyfill @react-native-async-storage/async-storage @supabase/supabase-js --legacy-peer-deps
          npm install --save-dev @react-native/babel-preset @react-native-community/cli @react-native-community/cli-platform-android --legacy-peer-deps

          # إنشاء ملف إعدادات المترجم (Metro) الخاص بالهواتف لمنع صفحات الويب
          cat > metro.config.js << 'EOF'
          const {getDefaultConfig, mergeConfig} = require('@react-native/metro-config');
          const config = {};
          module.exports = mergeConfig(getDefaultConfig(__dirname), config);
          EOF

          # إنشاء ملف البناء (Babel)
          cat > babel.config.js << 'EOF'
          module.exports = {
            presets: ['module:@react-native/babel-preset'],
          };
          EOF

      # =========================
      # 5. توليد مجلد أندرويد (Android Folder) الحقيقي
      # =========================
      - name: Generate True Android Folder
        run: |
          # توليد المجلد الأصلي النظيف للهواتف عبر سكربت CLI مخصص
          npx @react-native-community/cli init TemporaryApp --template react-native-template-typescript --skip-install || true
          if [ -d "TemporaryApp/android" ]; then
            cp -r TemporaryApp/android ./android
            rm -rf TemporaryApp
          else
            # خيار بديل سريع في حال فشل القالب لضمان بناء المجلد بنجاح
            mkdir -p android
            npx react-native android --package-name com.seachat.app || true
          fi

      # =========================
      # 6. تثبيت خط القاهرة داخل الأندرويد الأصلي
      # =========================
      - name: Setup Cairo Font
        run: |
          mkdir -p android/app/src/main/assets/fonts
          curl -L https://github.com -o android/app/src/main/assets/fonts/Cairo-Regular.ttf

      # =========================
      # 7. إنشاء ملف التصميم والألوان
      # =========================
      - name: Create Theme
        run: |
          mkdir -p src/constants
          cat > src/constants/theme.js << 'EOF'
          export const Colors = {
            primary: '#BF360C',
            secondary: '#FF6F00',
            background: '#FFF3E0',
            surface: '#FFFFFF',
            text: '#111111'
          };
          export const Fonts = {
            regular: 'Cairo-Regular'
          };
          EOF

      # =========================
      # 8. إصلاح مسارات الاستيراد
      # =========================
      - name: Fix Imports
        run: |
          find src -type f \( -name "*.js" -o -name "*.jsx" -o -name "*.ts" -o -name "*.tsx" \) -exec sed -i 's|\./src/hooks/useAuth|\./src/screens/hooks/useAuth|g' {} + || true

      # =========================
      # 9. إعداد اتصال Supabase للهاتف
      # =========================
      - name: Create Supabase Config
        run: |
          mkdir -p src/constants
          cat > src/constants/supabase.js << 'EOF'
          import 'react-native-url-polyfill/auto';
          import AsyncStorage from '@react-native-async-storage/async-storage';
          import { createClient } from '@supabase/supabase-js';

          const supabaseUrl = 'https://YOUR_PROJECT.supabase.co';
          const supabaseAnonKey = 'YOUR_ANON_KEY';

          export const supabase = createClient(
            supabaseUrl,
            supabaseAnonKey,
            {
              auth: {
                storage: AsyncStorage,
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: false
              }
            }
          );
          EOF

      # =========================
      # 10. تجميع وبناء ملف الـ APK الأصلي
      # =========================
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # =========================
      # 11. رفع ملف الـ APK لتنزيله وتجربته فوراً
      # =========================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Native-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
