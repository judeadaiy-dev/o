name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          # حذفت cache: 'npm' حتى ما يطلب package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Install Latest Libraries
        run: |
          npx expo install @supabase/supabase-js react-native-url-polyfill
          npx expo install expo-image-picker expo-av expo-camera
          npx expo install @react-native-async-storage/async-storage

      - name: Prebuild Android - Expo
        run: npx expo prebuild --platform android --clean

      - name: Apply High Contrast Desert Theme + Permissions
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <resources>
              <color name="desert_orange">#FF6F00</color>
              <color name="desert_red">#BF360C</color>
              <color name="desert_dark">#3E2723</color>
              <color name="desert_light">#FFF3E0</color>
          </resources>
          EOF
          
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <application
                android:name=".MainApplication"
                android:label="@string/app_name"
                android:icon="@mipmap/ic_launcher"
                android:theme="@style/AppTheme"
                android:usesCleartextTraffic="true">
                <activity
                  android:name=".MainActivity"
                  android:exported="true">
                  <intent-filter>
                      <action android:name="android.intent.action.MAIN" />
                      <category android:name="android.intent.category.LAUNCHER" />
                  </intent-filter>
                </activity>
              </application>
          </manifest>
          EOF

      - name: Add Fonts + Colors
        run: |
          mkdir -p android/app/src/main/assets/fonts
          curl -L -o android/app/src/main/assets/fonts/Cairo-Bold.ttf https://github.com/Gue3bara/Cairo/releases/download/v6.0.1/Cairo-Bold.ttf
          
          mkdir -p src
          cat > src/colors.js << 'EOF'
          export const Colors = {
            primary: '#BF360C', secondary: '#FF6F00', accent: '#FFAB00',
            background: '#FFF3E0', surface: '#FFFFFF', surfaceDark: '#3E2723',
            text: '#000000', textOnPrimary: '#FFFFFF', textSecondary: '#5D4037',
          };
          export const Fonts = { arabic: 'Cairo-Bold' };
          EOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
