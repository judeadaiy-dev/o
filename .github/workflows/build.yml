name: Build SeaChat Auto-Complete
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java & Node
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Auto-Generate Missing Project Files
        run: |
          # إنشاء index.js إذا كان مفقوداً
          if [ ! -f index.js ]; then
            echo "import {AppRegistry} from 'react-native'; import App from './App'; import {name as appName} from './app.json'; AppRegistry.registerComponent(appName, () => App);" > index.js
          fi

          # إنشاء app.json إذا كان مفقوداً لتعريف اسم التطبيق
          if [ ! -f app.json ]; then
            echo '{"name": "SeaChat", "displayName": "SeaChat"}' > app.json
          fi

          # إنشاء App.js بسيط كاختبار إذا لم يوجد كود
          if [ ! -f App.js ]; then
            echo "import React from 'react'; import {View, Text} from 'react-native'; export default function App() { return <View style={{flex:1, justifyContent:'center', alignItems:'center'}}><Text>SeaChat Ready!</Text></View> }" > App.js
          fi

          # إنشاء metro.config.js تلقائياً
          cat <<EOF > metro.config.js
          const {getDefaultConfig, mergeConfig} = require('@react-native/metro-config');
          module.exports = mergeConfig(getDefaultConfig(__dirname), {});
          EOF

      - name: Install Dependencies (Fixed Versions)
        run: |
          npm install react-native@0.74.5 react@18.2.0 --legacy-peer-deps
          npm install @react-native/metro-config @react-native/babel-preset --save-dev --legacy-peer-deps
          npm install @react-navigation/native @react-navigation/native-stack @react-navigation/bottom-tabs --legacy-peer-deps
          npm install react-native-screens react-native-safe-area-context react-native-paper react-native-vector-icons --legacy-peer-deps
          npm install @supabase/supabase-js react-native-url-polyfill --legacy-peer-deps

      - name: Fix Android Environment & Generate Wrapper if Missing
        run: |
          # التأكد من وجود مجلد android ومجلد الأصول
          mkdir -p android/app/src/main/assets
          
          # حقن استراتيجية حل النزاعات في ملف build.gradle الرئيسي لفرض مكتبات الأندرويد المستقرة
          if [ -f android/build.gradle ]; then
            sed -i '/allprojects {/a \    configurations.all { resolutionStrategy { force "androidx.core:core:1.13.1", "androidx.core:core-ktx:1.13.1" } }' android/build.gradle
          fi

          # ضبط الذاكرة والـ SDK
          {
            echo "org.gradle.jvmargs=-Xmx4096m"
            echo "android.useAndroidX=true"
            echo "android.enableJetifier=true"
            echo "hermesEnabled=true"
            echo "newArchEnabled=false"
            echo "android.suppressUnsupportedCompileSdk=35"
          } > android/gradle.properties
          
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

          # الحل الذكي: إذا كان ملف gradlew مفقوداً، نقوم بتوليده فوراً باستخدام جرادل النظام
          cd android
          if [ ! -f gradlew ]; then
            echo "Gradlew missing! Generating a new one..."
            gradle wrapper --gradle-version 8.6
          fi

      - name: Build JS Assets
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Finalize & Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4096m"

      - name: Export APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Full-Auto-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
