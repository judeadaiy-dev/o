name: Build SeaChat Auto-Complete
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Auto-Generate Missing JS Files
        run: |
          if [ ! -f package.json ]; then
            echo '{"name": "SeaChat", "version": "0.0.1", "private": true, "scripts": {"android": "react-native run-android"}}' > package.json
          fi

          if [ ! -f app.json ]; then
            echo '{"name": "SeaChat", "displayName": "SeaChat"}' > app.json
          fi

          if [ ! -f index.js ]; then
            echo "import {AppRegistry} from 'react-native'; import App from './App'; import {name as appName} from './app.json'; AppRegistry.registerComponent(appName, () => App);" > index.js
          fi

          if [ ! -f App.js ]; then
            echo "import React from 'react'; import {View, Text} from 'react-native'; export default function App() { return <View style={{flex:1, justifyContent:'center', alignItems:'center', backgroundColor:'#121212'}}><Text style={{color:'#fff', fontSize:20}}>SeaChat Tank Engine Active!</Text></View> }" > App.js
          fi

          # ملف Babel إجباري لمنع انهيار حزمة الـ Assets
          echo "module.exports = { presets: ['module:@react-native/babel-preset'] };" > babel.config.js

          cat <<EOF > metro.config.js
          const {getDefaultConfig, mergeConfig} = require('@react-native/metro-config');
          module.exports = mergeConfig(getDefaultConfig(__dirname), {});
          EOF

      - name: Install Critical Dependencies
        run: |
          npm install react-native@0.74.5 react@18.2.0 --legacy-peer-deps
          npm install @react-native/metro-config@0.74.5 @react-native/babel-preset@0.74.5 --save-dev --legacy-peer-deps
          npm install @react-navigation/native @react-navigation/native-stack @react-navigation/bottom-tabs --legacy-peer-deps
          npm install react-native-screens react-native-safe-area-context react-native-paper react-native-vector-icons --legacy-peer-deps
          npm install @supabase/supabase-js react-native-url-polyfill --legacy-peer-deps

      - name: Scaffold Complete Native Android Structure
        run: |
          # توليد بنية أندرويد حقيقية متوافقة بالكامل مع React Native CLI إذا لم تكن موجودة
          if [ ! -d android/app ]; then
            echo "Android folder missing. Generating complete native boilerplate..."
            npx --yes react-native@0.74.5 init SeaChatTmp --template react-native-template-typescript --skip-install || true
            mkdir -p android
            cp -r SeaChatTmp/android/* android/
            rm -rf SeaChatTmp
          fi

      - name: Setup Gradle Cache (High Speed)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Hard-Fix Android Dependencies & System Properties
        run: |
          # حقن استراتيجية حل النزاعات لحل مشكلة إصدارات androidx.core المتضاربة
          if [ -f android/build.gradle ]; then
            sed -i '/allprojects {/a \    configurations.all { resolutionStrategy { force "androidx.core:core:1.13.1", "androidx.core:core-ktx:1.13.1" } }' android/build.gradle
          fi

          # إعداد الخصائص المتقدمة للذاكرة والمعمارية والـ SDK لمنع انهيار المترجم
          {
            echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m"
            echo "android.useAndroidX=true"
            echo "android.enableJetifier=true"
            echo "hermesEnabled=true"
            echo "newArchEnabled=false"
            echo "android.suppressUnsupportedCompileSdk=35"
          } > android/gradle.properties
          
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          
          # تأمين وجود مجلد الأصول ومسح الملفات القديمة لتفادي Duplicate Resources error
          mkdir -p android/app/src/main/assets
          rm -rf android/app/src/main/res/drawable-*
          rm -rf android/app/src/main/res/raw

      - name: Compile Production JS Assets Bundle
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/build/generated/res/react/release

      - name: Execute Heavy Android Build (APK)
        working-directory: android
        run: |
          chmod +x gradlew
          # تنظيف الكاش القديم للتطبيق ثم البناء المباشر
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4096m"

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Full-Auto-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
