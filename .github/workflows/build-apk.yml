name: Build APK React Native CLI

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup React Native Vector Icons
        run: |
          cp node_modules/react-native-vector-icons/Fonts/*.ttf android/app/src/main/assets/fonts/
          cp node_modules/react-native-vector-icons/Fonts/*.ttf android/app/src/main/res/font/ || true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.parallel=true" >> android/gradle.properties
          echo "org.gradle.configureondemand=true" >> android/gradle.properties

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Clean Build
        run: cd android && ./gradlew clean --no-daemon

      - name: Build APK
        run: |
          cd android
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon -x lint -x test
          else
            ./gradlew assembleDebug --no-daemon -x lint -x test
          fi
        env:
          NODE_ENV: production

      - name: Rename APK
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/SeaChat-release.apk
          else
            mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/SeaChat-debug.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-APK-${{ github.event.inputs.build_type }}
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 30
