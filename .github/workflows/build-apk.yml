name: Auto-Generate and Build SeaChat
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Project Dependencies
        run: npm install

      - name: Generate Android Folder
        run: |
          # نستخدم npx لإنشاء مشروع مؤقت لنسخ مجلد الأندرويد منه المتوافق مع إصدارك
          npx react-native@0.74.5 init TempProject --version 0.74.5 --skip-install --install-pods false
          cp -r TempProject/android ./
          rm -rf TempProject
          echo "Android folder generated successfully."

      - name: Setup Gradle & Local Properties
        run: |
          chmod +x android/gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          # التأكد من تسمية التطبيق داخل ملفات الأندرويد بـ SeaChat
          sed -i 's/TempProject/SeaChat/g' android/settings.gradle
          sed -i 's/TempProject/SeaChat/g' android/app/src/main/res/values/strings.xml

      - name: Build APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Generated-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
