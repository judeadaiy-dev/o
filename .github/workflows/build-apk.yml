name: Build SeaChat APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 3. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 4. Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 5. Install NPM Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install -g @react-native-community/cli

      - name: 6. Generate Android Project
        run: |
          if [ ! -d "android" ]; then
            echo "Generating android folder..."
            npx react-native eject
          else
            echo "Android folder exists"
          fi

      - name: 7. Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: 8. Setup Vector Icons
        run: |
          mkdir -p android/app/src/main/assets/fonts
          cp node_modules/react-native-vector-icons/Fonts/*.ttf android/app/src/main/assets/fonts/
          echo "Fonts copied"

      - name: 9. Fix Gradle Settings
        run: |
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.parallel=true" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

      - name: 10. Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: 11. Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: 12. Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace -x lint -x lintVitalRelease
          
      - name: 13. Get APK Path
        run: |
          find android/app/build/outputs/apk -name "*.apk"
          ls -la android/app/build/outputs/apk/debug/

      - name: 14. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: error
