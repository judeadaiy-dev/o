name: Build SeaChat APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: android-actions/setup-android@v3

      - name: Install NPM
        run: npm install --legacy-peer-deps

      - name: Generate Android Folder
        run: |
          npx react-native@0.74.5 init SeaChatTemp --skip-install --version 0.74.5
          cp -r SeaChatTemp/android ./
          rm -rf SeaChatTemp
          sed -i 's/SeaChatTemp/SeaChat/g' android/app/src/main/res/values/strings.xml
          find android -type f -exec sed -i 's/com.seachattemp/com.seachat/g' {} +
          mv android/app/src/main/java/com/seachattemp android/app/src/main/java/com/seachat

      - name: Setup Project
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          mkdir -p android/app/src/main/assets/fonts
          cp node_modules/react-native-vector-icons/Fonts/*.ttf android/app/src/main/assets/fonts/
          echo "org.gradle.jvmargs=-Xmx4096m" >> android/gradle.properties
          chmod +x android/gradlew

      - name: Bundle & Build
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
          cd android && ./gradlew assembleDebug -x lint
          
      - uses: actions/upload-artifact@v4
        with:
          name: SeaChat-APK
          path: android/app/build/outputs/apk/debug/*.apk
