name: Build SeaChat APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Start Build Log
        run: echo "=== STARTING BUILD ==="

      - name: Install RN
        run: npm install react-native@0.74.5 --save

      - name: Create Files
        run: |
          echo '{"name":"SeaChat","displayName":"SeaChat"}' > app.json
          echo 'import {AppRegistry} from "react-native";import App from "./App";import {name as appName} from "./app.json";AppRegistry.registerComponent(appName, () => App);' > index.js
          echo "Files created"
          ls -la

      - name: Init Android
        run: |
          npx react-native@0.74.5 init SeaChatTemp --version 0.74.5 --skip-install
          cp -r SeaChatTemp/android ./
          rm -rf SeaChatTemp
          echo "Android folder exists:"
          ls -la android

      - name: Setup Gradle
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "org.gradle.jvmargs=-Xmx4096m" >> android/gradle.properties
          chmod +x android/gradlew

      - name: Bundle
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: Build
        run: cd android && ./gradlew assembleDebug --stacktrace
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
